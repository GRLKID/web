<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>GRLKID — Order confirmed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fdfaf3; --ink: #0e0e0e; --ink-soft: #6d6a63;
    --pink: #ff2e88; --rose: #ff007f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: "Jost","Helvetica Neue",Arial,sans-serif; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; min-height: 100lvh;
    display: flex; flex-direction: column;
  }
  .bar { height: 26px; background: var(--ink); flex: none; }
  .wrap {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    max-width: 620px; margin: 0 auto; padding: 40px 26px; width: 100%;
  }
  .micro { font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-soft); }
  .head { display: flex; align-items: center; gap: 22px; margin-bottom: 44px; }
  .head .rule { flex: 1; height: 1px; background: var(--rose); }
  h1 { font-weight: 300; font-size: clamp(38px,7vw,62px); letter-spacing: -.02em; margin: 0 0 18px; }
  p { font-weight: 300; color: var(--ink-soft); margin: 0 0 16px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--pink); margin-right: 9px; vertical-align: middle; }
  .back {
    display: inline-block; margin-top: 26px; padding: 14px 22px;
    background: var(--ink); color: #f2eee4; text-decoration: none;
    font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
  }
  .back:hover { background: var(--pink); color: var(--ink); }
  footer { padding: 22px 26px; }
</style>
</head>
<body>
<div class="bar"></div>
<div class="wrap">
  <div class="head">
    <span class="micro">GRLKID</span>
    <span class="rule"></span>
    <span class="micro">Order confirmed</span>
  </div>
  <h1>Thank you.</h1>
  <p><span class="dot"></span>Your order is in. A confirmation is on its way to your inbox.</p>
  <p id="detail">We'll email you again the moment it ships.</p>
  <a class="back" href="/shop">Back to the shop</a>
</div>
<footer><span class="micro">GRLKID © 2026</span></footer>
<div class="bar"></div>

<script>
  // Purely cosmetic. The order is recorded by the Stripe webhook, not here --
  // landing on this page is not proof of payment and never marks anything paid.
  var id = new URLSearchParams(location.search).get("session_id");
  if (!id) {
    document.getElementById("detail").textContent =
      "If you just completed a purchase, your confirmation email is on its way.";
  }
</script>
</body>
</html>
